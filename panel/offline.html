<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión — RE-BOMBA Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0D0F;
    color: #E8F4F8;
    font-family: 'Barlow', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    gap: 20px;
  }
  .icon { font-size: 64px; opacity: 0.4; }
  h1 { font-size: 24px; font-weight: 700; color: #00E676; letter-spacing: 1px; }
  p { color: #8A9BA8; font-size: 14px; line-height: 1.7; max-width: 280px; }
  button {
    background: #00E676;
    color: #0A0D0F;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>El panel necesita conexión para mostrar los datos en tiempo real. Chequeá tu internet y volvé a intentar.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
